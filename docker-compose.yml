services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sipus-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_NAME=SiPusDigital
      - APP_ENV=production
      - APP_KEY=base64:XG8d2mUv5fTdfa1m8z98B9jX5d1aB7pX9x1aC7aB2bY= # Anda bisa ganti dengan php artisan key:generate
      - APP_DEBUG=false
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sipus_db
      - DB_USERNAME=sipus_user
      - DB_PASSWORD=sipus_secure_password
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=sync
    depends_on:
      - db
    volumes:
      - sipus-storage:/var/www/html/storage

  db:
    image: mysql:8.0
    container_name: sipus-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: sipus_db
      MYSQL_USER: sipus_user
      MYSQL_PASSWORD: sipus_secure_password
      MYSQL_ROOT_PASSWORD: root_secure_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  sipus-storage:
  mysql-data:
